name: backend-ci

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # contextLoads() needs a live MySQL/Redis (see application-dev.yaml), which this
      # minimal CI doesn't provision — skip test execution, keep compile + packaging.
      - name: Build
        run: ./gradlew build -x test
