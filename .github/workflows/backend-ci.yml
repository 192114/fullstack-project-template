name: backend-ci

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Service-layer unit tests mock their dependencies (JUnit5 + Mockito, see
      # backend/.qoder/rules/testing-convention.md) — no live MySQL/Redis needed in CI.
      - name: Build and test
        run: ./gradlew build
